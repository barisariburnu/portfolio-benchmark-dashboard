services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-benchmark
    ports:
      - "7505:7505"
    environment:
      - DATABASE_URL=file:/app/data/portfolio.db
      - JWT_SECRET=change-this-secret-in-production
      - NODE_ENV=production
    volumes:
      - ./db:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:7505/login",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


